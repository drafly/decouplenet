name: SONY
test_as_valid: true
manual_seed: 3407 # is all you need
output: runs

loss:
  types:
  - L1 #pred_rgb & gt_rgb
  - L1 #pred_rgb_Amp
  - L1 #pred_rgb_Pha
  - L1 #pred_raw & gt_raw
  - L1 #pred_raw_Amp
  - L1 #pred_raw_Pha
  weights:
  - 1.0
  - 0.05
  - 0.05
  - 1.0
  - 0.05
  - 0.05

data:
  name: SIDSonyDataset
  data_dir: ./datasets/SID/Sony
  num_workers: 16
  pin_memory: true
  process:
    max_clip: 1.0
    min_clip: null
    transpose: true
    h_flip: true
    v_flip: true
  test:
    batch_size: 1
    image_list_file: Sony_test_list.txt
  train:
    batch_size: 1
    image_list_file: Sony_train_list.txt
    patch_size: 512
  valid:
    batch_size: 1
    image_list_file: Sony_val_list.txt

model:
  name: DMN
  DMN:
    f_number: 32
    block_size: 2

train:
  base_lr: 1.0e-4
  last_lr_epoch: 300
  clip_grad: 0.1
  epochs: 300
  lr_scheduler:
    type: cosine
  optimizer: 
    type: adamw
    eps: 1.0e-8
    betas: [0.9, 0.999]
  min_lr: 1.0e-5
  start_epoch: 0
  weight_decay: 0
  warmup_epochs: 0
